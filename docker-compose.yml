services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: edificios
      POSTGRES_PASSWORD: edificios
      POSTGRES_DB: edificios
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edificios -d edificios']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
